<head>
    <meta charset="UTF-8" />
    <title>Gestão Operacional</title>
</head>

<section class="gestao-op" aria-label="Gestão Operacional">
    <div class="gestao-op__crumbs">Operação / <strong>Gestão Operacional</strong></div>

    <header class="gestao-op__header">
        <h2 class="gestao-op__title">
            <i class="fa-solid fa-chevron-left"></i>
            Gestão Operacional
        </h2>
    </header>

    <!-- Filtros -->
    <div class="gestao-op__filters">
        <div class="gestao-op__filters-main">
            <div class="gestao-op__filters-row">
                <!-- Filtro Fazendas -->
                <div class="gestao-op__filter-group">
                    <label class="gestao-op__filter-label">Fazendas selecionadas</label>
                    <div class="gestao-op__multi" data-gestao-farm-multi>
                        <div class="gestao-op__multi-control" data-gestao-farm-control>
                            <div class="gestao-op__chips" data-gestao-farm-chips></div>
                            <input class="gestao-op__search" type="text" placeholder="Selecione as fazendas"
                                data-gestao-farm-search />
                            <span class="gestao-op__chev" aria-hidden="true">
                                <i class="fa-solid fa-chevron-down"></i>
                            </span>
                        </div>
                        <div class="gestao-op__dropdown" data-gestao-farm-dropdown aria-hidden="true">
                            <div class="gestao-op__list" data-gestao-farm-list></div>
                        </div>
                    </div>
                </div>

                <!-- Filtro Status -->
                <div class="gestao-op__filter-group">
                    <label class="gestao-op__filter-label">Tipos de status</label>
                    <div class="gestao-op__select">
                        <span class="gestao-op__select-text gestao-op__select-text--placeholder">Crítico, Normal</span>
                        <i class="fa-solid fa-chevron-down"></i>
                    </div>
                </div>

                <!-- Filtro Equipamento -->
                <div class="gestao-op__filter-group">
                    <label class="gestao-op__filter-label">Tipo de Equipamento</label>
                    <div class="gestao-op__select">
                        <span class="gestao-op__select-text">Todos</span>
                        <i class="fa-solid fa-chevron-down"></i>
                    </div>
                </div>
            </div>
        </div>

        <div class="gestao-op__filters-side">
            <div class="gestao-op__filters-row">
                <!-- Filtro Ordenação -->
                <div class="gestao-op__filter-group">
                    <label class="gestao-op__filter-label">Ordenar por</label>
                    <div class="gestao-op__select">
                        <span class="gestao-op__select-text">Ordem alfabética</span>
                        <i class="fa-solid fa-chevron-down"></i>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="gestao-op__content">
        <!-- Coluna Esquerda: Dispositivos -->
        <div class="gestao-op__devices">
            <div id="gestaoDevicesContainer" class="gestao-op__devices-list">
                <!-- Cards via JS -->
            </div>
        </div>

        <!-- Coluna Direita: Timeline + Programações -->
        <div class="gestao-op__side-content">
            <div class="gestao-op__timeline">
                <div id="gestaoTimelineContainer" class="gestao-op__timeline-list">
                    <!-- Timeline via JS -->
                </div>
                <div class="gestao-op__pagination">
                    <button class="gestao-op__page-btn is-disabled"><i class="fa-solid fa-chevron-left"></i></button>
                    <button class="gestao-op__page-btn is-active">1</button>
                    <button class="gestao-op__page-btn">2</button>
                    <button class="gestao-op__page-btn"><i class="fa-solid fa-chevron-right"></i></button>
                </div>
            </div>

            <div class="gestao-op__scheduled">
                <div id="gestaoScheduledContainer" class="gestao-op__scheduled-list">
                    <!-- Programações via JS -->
                </div>
                <div class="gestao-op__pagination">
                    <button class="gestao-op__page-btn is-disabled"><i class="fa-solid fa-chevron-left"></i></button>
                    <button class="gestao-op__page-btn is-active">1</button>
                    <button class="gestao-op__page-btn">2</button>
                    <button class="gestao-op__page-btn"><i class="fa-solid fa-chevron-right"></i></button>
                </div>
            </div>
        </div>
    </div>
</section>
